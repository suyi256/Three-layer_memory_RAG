# 本地开发：MySQL（业务与注册表）+ Elasticsearch（词法检索）+ Chroma（向量）
# 启动：docker compose up -d
# 首次启动 MySQL 会自动执行 database/mysql/init/*.sql

services:
  mysql:
    image: mysql:8.4
    container_name: rag-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-ragroot}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-rag_db}
      MYSQL_USER: ${MYSQL_USER:-rag}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ragpass}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/mysql/init:/docker-entrypoint-initdb.d:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    container_name: rag-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.routing.allocation.disk.threshold_enabled=false
    ports:
      - "${ES_PORT:-9200}:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://127.0.0.1:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s

  chroma:
    # 0.5.16+ 镜像含 v2 API；健康检查同时尝试 v2 / v1 以兼容不同版本
    image: chromadb/chroma:0.5.23
    container_name: rag-chroma
    restart: unless-stopped
    environment:
      - ANONYMIZED_TELEMETRY=False
    ports:
      - "${CHROMA_PORT:-8000}:8000"
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request as u; u.urlopen('http://127.0.0.1:8000/api/v2/heartbeat', timeout=5).read()\" || python -c \"import urllib.request as u; u.urlopen('http://127.0.0.1:8000/api/v1/heartbeat', timeout=5).read()\"",
        ]
      interval: 10s
      timeout: 8s
      retries: 15
      start_period: 25s

volumes:
  mysql_data:
  es_data:
  chroma_data:
